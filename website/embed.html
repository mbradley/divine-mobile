<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Video Widget</title>
    <link rel="stylesheet" href="embed-styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script>
        // Apply theme immediately to prevent flash
        var t = new URLSearchParams(window.location.search).get('theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
    </script>
</head>
<body>
    <!-- Loading state -->
    <div id="embed-loading" class="embed-loading">
        <div class="embed-spinner"></div>
        <div>Loading...</div>
    </div>

    <!-- Main content (hidden until loaded) -->
    <div id="embed-content" class="embed-container hidden">
        <div id="embed-profile"></div>
        <div id="embed-videos"></div>
        <div id="embed-cta"></div>
        <div class="embed-footer">
            <a href="https://divine.video" target="_blank" rel="noopener">Powered by Divine</a>
        </div>
    </div>

    <script src="embed-viewer.js"></script>
</body>
</html>
