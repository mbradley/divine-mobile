name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'local_stack/**'
      - '.github/workflows/e2e-test.yml'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk \
            /opt/ghc /usr/local/share/powershell /usr/share/swift
          sudo docker image prune --all --force
          df -h /

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Configure Gradle for CI
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<'EOF'
          org.gradle.daemon=true
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.jvmargs=-Xmx3g -XX:+HeapDumpOnOutOfMemoryError
          EOF

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      # Build ALL APKs BEFORE starting Docker/emulator to avoid memory pressure.
      # flutter test integration_test always triggers its own Gradle build which
      # crashes the emulator due to CPU contention. Instead, pre-build both APKs
      # and install them directly via adb in the emulator step.
      - name: Pre-build app and test APKs (x86_64 only)
        working-directory: mobile
        run: |
          # Build app APK with integration test as Dart entry point (required for am instrument)
          flutter build apk --debug \
            --dart-define=DEFAULT_ENV=LOCAL \
            --target-platform=android-x64 \
            --target=integration_test/auth/auth_journey_test.dart

          # Build the test runner APK (contains FlutterTestRunner + AndroidJUnitRunner)
          cd android && ./gradlew app:assembleAndroidTest

      - name: Generate master.key and .env
        working-directory: local_stack
        run: |
          openssl rand 32 | base64 > master.key
          NSEC=$(openssl rand -hex 32)
          echo "SERVER_NSEC=$NSEC" > .env

      - name: Start backend services
        working-directory: local_stack
        run: docker compose up -d --wait --wait-timeout 120

      - name: Verify services are healthy
        working-directory: local_stack
        run: |
          docker compose ps
          curl -sf http://localhost:43000/health

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-default-x86_64

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          working-directory: mobile
          script: |
            adb shell settings put global window_animation_scale 0.0
            adb shell settings put global transition_animation_scale 0.0
            adb shell settings put global animator_duration_scale 0.0

            # Install pre-built APKs directly (no Gradle build during emulator run)
            adb install -r build/app/outputs/flutter-apk/app-debug.apk
            adb install -r build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk

            # List installed packages and test runners for debugging
            adb shell pm list packages co.openvine
            adb shell pm list instrumentation

            # Run instrumentation tests and capture output (don't exit on failure yet)
            adb shell am instrument -w co.openvine.app.test/androidx.test.runner.AndroidJUnitRunner 2>&1 | tee test_output.txt
            RESULT=${PIPESTATUS[0]}

            # Show result and exit with the instrumentation exit code
            if [ "$RESULT" -ne 0 ] || grep -q "FAILURES\|INSTRUMENTATION_FAILED\|Error=" test_output.txt; then
              echo "::error::Integration tests failed (exit code: $RESULT)"
              exit 1
            fi

            echo "Integration tests passed!"

      - name: Show service logs on failure
        if: failure()
        working-directory: local_stack
        run: docker compose logs --tail=200

      - name: Stop services
        if: always()
        working-directory: local_stack
        run: docker compose down -v
